<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南水北调·世纪工程</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0078d4;
            --deep-blue: #004a82;
            --light-blue: #4da6ff;
            --cyan: #00b4d8;
            --dark-bg: #0a1628;
            --card-bg: rgba(0, 50, 100, 0.4);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        /* 背景动效 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--cyan);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
            25% { transform: translateY(-100px) translateX(50px); opacity: 0.3; }
            50% { transform: translateY(-200px) translateX(-30px); opacity: 0.6; }
            75% { transform: translateY(-100px) translateX(-50px); opacity: 0.3; }
        }

        /* 页面容器 */
        .page {
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* 首页 */
        #home {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #0d2137 50%, var(--dark-bg) 100%);
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            background: linear-gradient(90deg, var(--light-blue), var(--cyan), var(--light-blue));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: rgba(255,255,255,0.7);
            margin-bottom: 3rem;
            letter-spacing: 0.3em;
        }

        .hero-divider {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            margin: 2rem auto;
        }

        .btn-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            justify-content: center;
            margin-top: 3rem;
            max-width: 700px;
        }

        .btn-card {
            position: relative;
            width: 280px;
            height: 200px;
            background: linear-gradient(145deg, rgba(0, 80, 140, 0.6), rgba(0, 40, 80, 0.8));
            border: 1px solid rgba(0, 180, 216, 0.4);
            border-radius: 24px;
            padding: 2rem;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            backdrop-filter: blur(20px);
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 216, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-card::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 180, 216, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .btn-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--cyan);
            box-shadow: 
                0 25px 50px rgba(0, 180, 216, 0.3),
                0 0 60px rgba(0, 180, 216, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-card:hover::before {
            left: 100%;
        }

        .btn-card:hover::after {
            opacity: 1;
        }

        .btn-card i {
            font-size: 3rem;
            color: var(--cyan);
            margin-bottom: 1.2rem;
            transition: all 0.4s;
            filter: drop-shadow(0 0 10px rgba(0, 180, 216, 0.5));
        }

        .btn-card:hover i {
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(0, 180, 216, 0.8));
        }

        .btn-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-card p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        .btn-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.3), rgba(0, 120, 212, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            border: 1px solid rgba(0, 180, 216, 0.3);
            transition: all 0.4s;
        }

        .btn-card:hover .btn-icon {
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.5), rgba(0, 120, 212, 0.4));
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.4);
            transform: rotateY(180deg);
        }

        .btn-icon i {
            margin-bottom: 0;
            font-size: 2rem;
        }

        .btn-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .btn-card p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        /* 子页面通用样式 */
        .sub-page {
            padding-top: 80px;
            padding-bottom: 2rem;
        }

        .sub-header {
            background: linear-gradient(180deg, rgba(0,50,100,0.8) 0%, transparent 100%);
            padding: 2rem;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--card-bg);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: var(--cyan);
            color: var(--dark-bg);
        }

        .sub-title {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--light-blue);
            text-shadow: 0 0 30px rgba(0,180,216,0.5);
        }

        .sub-desc {
            color: rgba(255,255,255,0.6);
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* 地图页面 */
        #mapPage {
            background: var(--dark-bg);
        }

        .map-container {
            width: 95%;
            max-width: 1200px;
            margin: 2rem auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0,180,216,0.2);
        }

        #mapChart {
            width: 100%;
            height: 500px;
            border-radius: 15px;
        }

        .map-legend {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-line {
            width: 40px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-east { background: #4CAF50; }
        .legend-middle { background: #FF9800; }
        .legend-west { background: #E91E63; }

        .map-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 95%;
            max-width: 1200px;
            margin: 2rem auto;
        }

        .info-card {
            background: var(--card-bg);
            border: 1px solid rgba(0,180,216,0.2);
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .info-card:hover {
            border-color: var(--cyan);
            transform: translateY(-5px);
        }

        .info-card h4 {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-card.east h4 { color: #4CAF50; }
        .info-card.middle h4 { color: #FF9800; }
        .info-card.west h4 { color: #E91E63; }

        .info-card p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* 时间轴页面 */
        #timelinePage {
            background: var(--dark-bg);
        }

        .timeline-container {
            width: 95%;
            max-width: 1200px;
            margin: 2rem auto;
        }

        .timeline-iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 15px;
            background: rgba(0,50,100,0.3);
        }

        /* 故事页面 */
        #storyPage {
            background: linear-gradient(180deg, var(--dark-bg) 0%, #0d2137 50%, var(--dark-bg) 100%);
        }

        .story-container {
            width: 95%;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        .volume {
            background: var(--card-bg);
            border: 1px solid rgba(0,180,216,0.3);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .volume::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--light-blue), var(--cyan));
        }

        .volume-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--cyan), var(--primary-blue));
            color: #fff;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .volume h2 {
            font-size: 1.8rem;
            color: var(--light-blue);
            margin-bottom: 1.5rem;
        }

        .volume p {
            color: rgba(255,255,255,0.85);
            font-size: 1.05rem;
            line-height: 2;
            margin-bottom: 1.2rem;
            text-align: justify;
        }

        .volume blockquote {
            background: rgba(0,180,216,0.1);
            border-left: 4px solid var(--cyan);
            padding: 1.2rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
            color: rgba(255,255,255,0.8);
        }

        .story-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .story-nav a {
            color: var(--cyan);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--cyan);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .story-nav a:hover {
            background: var(--cyan);
            color: var(--dark-bg);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .btn-container {
                flex-direction: column;
                align-items: center;
            }

            .btn-card {
                width: 100%;
                max-width: 300px;
            }

            .back-btn {
                position: static;
                transform: none;
                margin-bottom: 1rem;
            }

            .sub-header {
                padding-top: 1rem;
            }

            #mapChart {
                height: 350px;
            }

            .timeline-iframe {
                height: 450px;
            }
        }

        /* 动画入场 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="bg-particles" id="particles"></div>

    <!-- 首页 -->
    <div id="home">
        <h1 class="hero-title animate-in">南水北调·世纪工程</h1>
        <p class="hero-subtitle animate-in delay-1">纵横万里 水润中华</p>
        <div class="hero-divider animate-in delay-2"></div>
        <div class="btn-container">
            <a href="map3d.html" class="btn-card animate-in delay-2">
                <div class="btn-icon">
                    <img src="1.jpg" alt="工程线路">
                </div>
                <h3>3D工程线路</h3>
                <p>东中西三线 全景展示</p>
            </a>
            <a href="time.html" class="btn-card animate-in delay-3">
                <div class="btn-icon">
                    <img src="2.jpg" alt="时间轴">
                </div>
                <h3>工程时间轴</h3>
                <p>从构想到现实的伟大征程</p>
            </a>
            <a href="story.html" class="btn-card animate-in delay-4">
                <div class="btn-icon">
                    <img src="3.jpg" alt="工程故事">
                </div>
                <h3>工程故事</h3>
                <p>见证水利奇迹诞生</p>
            </a>
            <a href="qa.html" class="btn-card animate-in delay-5">
                <div class="btn-icon">
                    <img src="4.jpg" alt="工程问答">
                </div>
                <h3>工程问答</h3>
                <p>了解工程相关知识</p>
            </a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
        });
    </script>
</body>
</html>
